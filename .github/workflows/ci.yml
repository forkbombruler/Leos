name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy src

      - name: Tests with coverage
        run: |
          coverage run -m unittest discover -s tests
          coverage report --fail-under=83

      - name: Bandit security scan
        run: bandit -r src

      - name: Safety evals
        run: leos eval --suite safety

      - name: Generate local proof documents
        run: python scripts/generate_proofs.py --output docs/proofs --allow-dirty

      - name: Scan artifacts for secret literals
        run: python scripts/scan_artifacts_for_secrets.py --root .
